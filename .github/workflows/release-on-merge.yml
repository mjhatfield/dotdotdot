name: Release On Merge

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - src/**
      - phrase-packs/**
      - assets/**
      - .vscodeignore
      - .github/workflows/release-on-merge.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run compile

      - name: Determine release version and tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v$version"

          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "create_release=false" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "create_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        if: steps.meta.outputs.create_release == 'true'
        run: npx @vscode/vsce package

      - name: Create and push tag
        if: steps.meta.outputs.create_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Locate VSIX
        if: steps.meta.outputs.create_release == 'true'
        id: vsix
        shell: bash
        run: |
          set -euo pipefail
          vsix_file="$(ls -1 *.vsix | head -n1)"
          if [[ -z "$vsix_file" ]]; then
            echo "No VSIX file found after packaging" >&2
            exit 1
          fi
          echo "file=$vsix_file" >> "$GITHUB_OUTPUT"

      - name: Create draft GitHub release
        if: steps.meta.outputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          draft: true
          generate_release_notes: false
          body: ""
          files: ${{ steps.vsix.outputs.file }}

      - name: Summary
        run: |
          if [[ "${{ steps.meta.outputs.create_release }}" == "true" ]]; then
            {
              echo "## Draft release created"
              echo ""
              echo "- Tag: ${{ steps.meta.outputs.tag }}"
              echo "- Version: ${{ steps.meta.outputs.version }}"
              echo "- Asset: ${{ steps.vsix.outputs.file }}"
              echo ""
              echo "Release is in draft state with blank notes for manual editing."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Release skipped"
              echo ""
              echo "Tag ${{ steps.meta.outputs.tag }} already exists."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
